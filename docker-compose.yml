services:
  neo4j:
    image: neo4j:5-community
    container_name: neo4j-history-kg-qa
    ports:
      - "7688:7687"
      - "7475:7474"
    environment:
      NEO4J_AUTH: neo4j/kgqa123
      NEO4J_dbms_security_auth__minimum__password__length: 6
      NEO4J_PLUGINS: '[]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: mysql-history-kg-qa
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: history_kg_qa
      MYSQL_USER: kgqa
      MYSQL_PASSWORD: kgqa123
    volumes:
      - mysql_data:/var/lib/mysql
    user: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: etcd-history-kg-qa
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
      ETCD_SNAPSHOT_COUNT: 50000
    volumes:
      - etcd_data:/etcd
    command: etcd --advertise-client-urls=http://127.0.0.1:2379 --listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: minio-history-kg-qa
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ':9001'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-standalone:
    image: milvusdb/milvus:v2.4.1
    container_name: milvus-history-kg-qa
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19531:19530"
      - "9092:9091"
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_started

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-history-kg-qa
    ports:
      - "8001:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: kgqa123
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: kgqa
      MYSQL_PASSWORD: kgqa123
      MYSQL_DATABASE: history_kg_qa
      MILVUS_HOST: milvus-standalone
      MILVUS_PORT: 19530
      MILVUS_COLLECTION: kgqa_documents
      EMBEDDING_MODEL: bge-m3
      EMBEDDING_BASE_URL: http://host.docker.internal:11434
      LLM_MODEL_NAME: qwen3.5-plus
      LLM_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
      LLM_API_KEY: ${LLM_API_KEY:-sk-3f1bef4e439649c6a72a5a59ea4b65af}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-history-kgqa-secret-key-2026}
    depends_on:
      neo4j:
        condition: service_healthy
      mysql:
        condition: service_healthy
      milvus-standalone:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-history-kg-qa
    ports:
      - "81:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:
  mysql_data:
  etcd_data:
  minio_data:
  milvus_data:
